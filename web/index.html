<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAG Chat</title>
  
  <style>
    /* --- 1. Root & Variables --- */
    :root {
      --bg: #0b1220;
      --card: #071026;
      --muted: #9fb0d9;
      --accent: #4f46e5;
      --accent-rgb: 79, 70, 229;
      --text: #e6eef8;
      --border-color: #1b2738;
      --border-color-light: #112233;
    }
    body {
      font-family: Inter, Segoe UI, Roboto, Helvetica, Arial;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      /* We use flex to center the initial state */
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      transition: background-color 0.3s ease;
    }
    .hidden {
      display: none !important;
    }
    /* --- 2. Main App Container --- */
    .app-container {
      width: 90vw;
      max-width: 880px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(2, 6, 23, 0.7);
      padding: 30px;
      /* This transition handles the screen resize */
      transition: all 0.5s ease;
    }
    
    /* --- 3. Stage 1: URL Input Screen --- */
    #stage1 {
      text-align: center;
    }
    #stage1 h1 {
      margin-top: 0;
      font-size: 1.8em;
      color: var(--text);
    }
    #stage1 p {
      font-size: 1.1em;
      color: var(--muted);
      margin-bottom: 30px;
    }
    .url-input-container {
      display: flex;
      border-radius: 50px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: 0 5px 20px rgba(var(--accent-rgb), 0.2);
      transition: all 0.3s ease;
    }
    .url-input-container:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.4);
    }
    #urlInput {
      flex-grow: 1;
      border: none;
      background: var(--card);
      color: var(--text);
      padding: 20px 25px;
      font-size: 1.1em;
      outline: none;
    }
    #startIngest {
      border: none;
      background: var(--accent);
      color: white;
      padding: 20px 35px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    #startIngest:active {
      background-color: #3a32b8; /* Tap/Click Animation */
      transform: scale(0.98);
    }
    
    /* --- 4. Loading Overlay & Blur --- */
    body.blur-active .app-container {
      filter: blur(5px);
      transform: scale(0.98);
      opacity: 0.8;
    }
    #loadingOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      text-align: center;
    }
    #loadingOverlay .spinner {
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    #loadingOverlay .loading-text {
      margin-top: 20px;
      font-size: 1.2em;
      font-weight: bold;
      color: white;
      animation: pulse 1.5s infinite ease-in-out;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* --- 5. Stage 2: Chat Screen --- */
    #stage2 {
      display: flex;
      flex-direction: column;
      height: 100%; /* Will be set by JS */
    }
    /* This class is added to the body to transform the layout */
    body.stage-2 .app-container {
      height: 90vh; /* Taller */
      justify-content: flex-start; /* Un-center */
    }
    .chat-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-color-light);
    }
    /* Minimalist button for "New URL" */
    #reEnterLink {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--muted);
      font-weight: bold;
      font-size: 0.9em;
      padding: 8px 12px;
    }
    #reEnterLink:hover {
      background: var(--border-color);
      color: var(--text);
    }

    /* Chat History */
    .chat-history-container {
      flex-grow: 1; /* This makes it fill the space */
      margin-top: 10px;
      padding: 10px 0;
      box-sizing: border-box;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 8px;
    }
    /* "Ask anything!" message */
    #askAnything {
      font-size: 2em;
      font-weight: bold;
      color: var(--muted);
      text-align: center;
      margin: 80px 0;
      animation: fadeIn 1s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Message Styles (from your file) */
    .message {
      padding: 10px 15px;
      margin: 10px 15px;
      border-radius: 18px;
      max-width: 85%;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      animation: fadeIn 0.3s ease;
    }
    .message.user {
      background: var(--accent);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.ai {
      background: #111a28;
      color: var(--text);
      margin-right: auto;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border-color);
    }
    .message.error {
      background: #4a0e0e;
      color: #ffc2c2;
      border: 1px solid #8f2d2d;
    }
    
    /* Typing Animation (from your file) */
    .typing-dots::after {
      content: '...';
      overflow: hidden;
      display: inline-block;
      vertical-align: bottom;
      animation: typing 1.5s infinite steps(3, end);
    }
    @keyframes typing {
      0% { width: 0; }
      33% { width: 0.5em; }
      66% { width: 1em; }
      100% { width: 1em; }
    }
    
    /* Chat Input Area */
    .chat-input-area {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      border-top: 1px solid var(--border-color-light);
      padding-top: 15px;
    }
    .chat-input-area input {
      flex-grow: 1;
      padding: 12px 15px;
      font-size: 1em;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: #071226;
      color: var(--text);
    }
    .chat-input-area button {
      padding: 12px 20px;
      font-weight: bold;
    }

    /* Advanced Settings Dropdown */
    .debug-toggle {
      background: none;
      border: none;
    }
    .debug-toggle summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: bold;
      font-size: 0.9em;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      outline: none;
      user-select: none;
      transition: all 0.2s ease;
    }
    .debug-toggle summary:hover {
      background: var(--border-color);
      color: var(--text);
    }
    .debug-toggle[open] summary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .debug-controls {
      position: absolute;
      right: 30px;
      margin-top: 10px;
      background: var(--card);
      border: 1px solid var(--border-color);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      z-index: 50;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .debug-controls label {
      margin: 0;
      white-space: nowrap;
      color: var(--muted);
      font-size: 0.9em;
    }
    .debug-controls select {
      padding: 8px;
      flex: 1;
    }
    .debug-controls button {
      flex: 2;
      background: var(--border-color);
      color: var(--muted);
      font-weight: normal;
    }
    .debug-controls button:hover {
      background: var(--border-color-light);
      color: var(--text);
    }
  </style>
</head>
<body>
  
  <!-- Main Container -->
  <div class="app-container">
    
    <!-- STAGE 1: URL Input -->
    <div id="stage1">
      <h1>RAG Chat</h1>
      <p>Start by pasting a URL to ingest its content.</p>
      <form id="urlForm" class="url-input-container">
        <input id="urlInput" type="text" placeholder="https://en.wikipedia.org/wiki/..." required>
        <button id="startIngest" type="submit">Ingest</button>
      </form>
      <!-- This status is hidden but used by the JS -->
      <div id="ingestStatus" class="hidden"></div>
    </div>
    
    <!-- STAGE 2: Chat UI (hidden by default) -->
    <div id="stage2" class="hidden">
      
      <!-- Header with New URL & Settings -->
      <header class="chat-header">
        <button id="reEnterLink">New URL</button>
        <details class="debug-toggle">
          <summary>Advanced</summary>
          <div class="debug-controls">
            <label>K:</label>
            <select id="k">
              <option value="4">4</option>
              <option value="6">6</option>
              <option value="10">10</option>
            </select>
            <button id="debug">Debug</button>
          </div>
        </details>
      </header>
      
      <!-- Chat History -->
      <div id="chatHistory" class="chat-history-container">
        <div class="message ai" id="askAnything">Ask anything!</div>
      </div>
      
      <!-- Chat Input -->
      <form id="chatForm" class="chat-input-area">
        <input id="userInput" type="text" placeholder="Ask a question about the content..." required>
        <button id="ask" type="submit">Ask</button>
      </form>
    </div>
    
  </div>
  
  <!-- Loading Overlay (hidden by default) -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner"></div>
    <div class="loading-text">Ingesting URL...</div>
  </div>
  

  <!-- JAVASCRIPT LOGIC -->
  <script>
    // --- 1. API Base URL ---
    // Empty string '' means 'talk to the same server that sent this file'.
    // This is correct for deployment.
    // For local testing, change to 'http://127.0.0.1:8000'
    const API_BASE = '';
    
    // --- 2. Element References ---
    const body = document.body;
    const stage1 = document.getElementById('stage1');
    const stage2 = document.getElementById('stage2');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    // Stage 1 Elements
    const urlForm = document.getElementById('urlForm');
    const urlInput = document.getElementById('urlInput');
    const startIngest = document.getElementById('startIngest');
    const ingestStatus = document.getElementById('ingestStatus'); // We use this to store status
    
    // Stage 2 Elements
    const reEnterLink = document.getElementById('reEnterLink');
    const chatHistory = document.getElementById('chatHistory');
    const askAnything = document.getElementById('askAnything');
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const ask = document.getElementById('ask');
    const kEl = document.getElementById('k');
    const debugBtn = document.getElementById('debug');
    
    // --- 3. UI State Functions ---
    function showLoading(message = 'Ingesting URL...') {
      loadingOverlay.querySelector('.loading-text').textContent = message;
      body.classList.add('blur-active');
      loadingOverlay.classList.remove('hidden');
    }
    
    function showStage1() {
      body.classList.remove('stage-2');
      body.classList.remove('blur-active');
      stage1.classList.remove('hidden');
      stage2.classList.add('hidden');
      loadingOverlay.classList.add('hidden');
      // Reset chat
      chatHistory.innerHTML = '<div class="message ai" id="askAnything">Ask anything!</div>';
      urlInput.value = '';
    }
    
    function showStage2() {
      body.classList.add('stage-2');
      body.classList.remove('blur-active');
      stage1.classList.add('hidden');
      stage2.classList.remove('hidden');
      loadingOverlay.classList.add('hidden');
    }
    
    // --- 4. Message Appending Function ---
    function appendMessage(sender, text) {
      // Hide "Ask anything!" if it's visible
      const askAnythingEl = document.getElementById('askAnything');
      if (askAnythingEl) {
        askAnythingEl.classList.add('hidden');
      }
      
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', sender);
      messageDiv.textContent = text;
      chatHistory.appendChild(messageDiv);
      // Auto-scroll to the bottom
      chatHistory.scrollTop = chatHistory.scrollHeight;
      return messageDiv; // Return element for dynamic updates
    }
    
    // --- 5. Event Listeners ---
    
    // STAGE 1: Handle URL Ingestion
    urlForm.onsubmit = async (e) => {
      e.preventDefault();
      const url = urlInput.value.trim();
      if (!url) return;
      
      showLoading('Ingesting URL...');
      ingestStatus.textContent = 'Ingesting...';
      
      try {
        const res = await fetch(`${API_BASE}/ingest`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({url})
        });
        const data = await res.json();
        
        if (res.ok) {
          ingestStatus.textContent = 'Ingest complete.';
          // On success, go to chat screen
          showStage2();
        } else {
          throw new Error(data.detail || JSON.stringify(data));
        }
      } catch (e) {
        ingestStatus.textContent = 'Error';
        alert('Error starting ingest: ' + e.message);
        showStage1(); // Go back to stage 1 on failure
      }
    };
    
    // STAGE 2: Handle "New URL" button
    reEnterLink.onclick = () => {
      // We don't use confirm() as it's bad UI
      showStage1();
    };

    // STAGE 2: Handle Chat Form Submission
    chatForm.onsubmit = async (e) => {
      e.preventDefault();
      const q = userInput.value.trim();
      if (!q) return;

      appendMessage('user', q);
      userInput.value = '';

      const loadingMessage = appendMessage('ai', 'Thinking');
      loadingMessage.classList.add('typing-dots');
      
      try {
        const res = await fetch(`${API_BASE}/query`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ q, k: Number(kEl.value) })
        });
        const data = await res.json();
        
        loadingMessage.classList.remove('typing-dots');
        
        if (res.ok) {
          loadingMessage.textContent = data.answer;
        } else {
          loadingMessage.textContent = 'Error: ' + (data.detail || JSON.stringify(data));
          loadingMessage.classList.add('error');
        }
      } catch (e) {
        loadingMessage.classList.remove('typing-dots');
        loadingMessage.textContent = 'Fetch Error: ' + e.message;
        loadingMessage.classList.add('error');
      }
    };
    
    // STAGE 2: Handle Debug Button
    debugBtn.onclick = async () => {
      const q = userInput.value.trim() || "test"; // Debugs the current query or "test"
      appendMessage('user', `(Debug) ${q}`);
      
      const loadingMessage = appendMessage('ai', 'Running debug retrieval...');
      loadingMessage.classList.add('typing-dots');
      
      try {
        const res = await fetch(`${API_BASE}/debug_query`, {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ q, k: Number(kEl.value) })
        });
        const data = await res.json();

        loadingMessage.classList.remove('typing-dots');
        
        if (!res.ok) {
          loadingMessage.textContent = 'Debug error: ' + (data.detail || JSON.stringify(data));
          loadingMessage.classList.add('error');
          return;
        }
        
        const retrieved = data.retrieved || [];
        if (retrieved.length === 0) {
          loadingMessage.textContent = 'Debug: No chunks retrieved.';
          return;
        }
        
        let out = '--- DEBUG: RETRIEVED CHUNKS ---\n\n';
        for (let i = 0; i < retrieved.length; ++i) {
          const r = retrieved[i];
          const dist = r.distance != null ? r.distance.toFixed(4) : 'N/A';
          const snippet = (r.document || "").slice(0, 150) + '...';
          out += `Chunk ${i} (Dist: ${dist}):\n"${snippet}"\n\n`;
        }
        loadingMessage.textContent = out;
        
      } catch (e) {
        loadingMessage.classList.remove('typing-dots');
        loadingMessage.textContent = 'Debug Fetch Error: ' + e.message;
        loadingMessage.classList.add('error');
      }
    };
    
    // --- 6. Initial State ---
    // Start at stage 1 by default
    showStage1();
    
    // This button is in the old HTML, but not the new UI.
    // We provide a dummy handler in case it exists, but it's not
    // part of the new flow.
    const checkStatusBtn = document.getElementById('checkStatus');
    if (checkStatusBtn) {
      checkStatusBtn.onclick = () => {
        alert("Status is shown automatically during ingest.");
      }
    }

  </script>
</body>
</html>
